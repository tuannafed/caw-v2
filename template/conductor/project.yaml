# .claude/project.yaml — machine-readable project metadata
#
# THIS FILE IS THE SOURCE OF TRUTH FOR PROJECT METADATA.
# Anything that needs structured data about the project (backlog viewer,
# external tools, CI scripts) reads this file — not conventions.md.
#
# Generated by `cli/generate-project-meta.py` during `/caw-setup`.
# Re-run `/caw-setup --refresh` to regenerate from current package.json + conventions.md.
#
# conventions.md remains the source of truth for HUMAN prose
# (archetype rationale, folder contract, code organization patterns,
# verify commands). This YAML carries only what machines need.

# ── Identity ──────────────────────────────────────────────────────────
name: "{{PROJECT_NAME}}"        # short kebab-case slug, e.g. "dava2"
description: "{{ONE_LINER}}"    # one-sentence product description
team: "{{TEAM_NAME}}"           # team or owner, e.g. "dava2", "platform-infra"

# ── Archetype ─────────────────────────────────────────────────────────
archetype:
  id: "{{ARCHETYPE_ID}}"        # slug, e.g. "saas-redirect-dashboard", "nextjs-feature"
  summary: "{{ARCHETYPE_SUMMARY}}"  # one-sentence summary of what the project is

# ── Generation provenance ─────────────────────────────────────────────
generated_at: "{{ISO_TIMESTAMP}}"   # ISO8601 UTC, e.g. "2026-05-23T16:03:00Z"
generated_by: "cli/generate-project-meta.py"

# ── Stack ─────────────────────────────────────────────────────────────
# Ordered list of tech components. UI renders the first 6 as badges.
# Each item has:
#   role:    Display label for the row (e.g. "Backend", "Database", "Cache")
#   name:    Tech name (e.g. "Fastify", "PostgreSQL", "Redis")
#   version: Version string (e.g. "5.8.4", "14", "7"). Empty string if unknown.
#   icon:    Icon slug for known techs (e.g. "typescript", "react", "postgresql").
#            Use "generic" if no slug known.
stack:
  - role: "Backend"
    name: "Fastify"
    version: "5.8.4"
    icon: "generic"
  - role: "Database"
    name: "PostgreSQL"
    version: "14"
    icon: "postgresql"

# ── Tags ──────────────────────────────────────────────────────────────
# Free-form labels rendered as small badges. Up to 6 displayed.
tags:
  - "Backend API"
  - "TypeScript"
  - "Drizzle"

# ── Last updated ──────────────────────────────────────────────────────
# Date of the most recent meaningful change to this YAML or to conventions.md.
# Format: YYYY-MM-DD (no time).
last_updated: "{{YYYY_MM_DD}}"
