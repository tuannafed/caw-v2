name: tests

# Two gates keep main green:
#  - pytest: the durable-layer test suite (a change that breaks harness-cli can't land)
#  - validate: plugin-manifest + structure check (version skew, invalid JSON, a skill
#    whose frontmatter name != folder) — the drift classes a codebase audit found.
# Both are stdlib-only; pytest is the sole dep.

on:
  push:
    branches: [main]
    paths:
      - "plugins/caw/**"
      - ".claude-plugin/**"
      - "VERSION"
      - "requirements-dev.txt"
      - ".github/workflows/test.yml"
  pull_request:
    paths:
      - "plugins/caw/**"
      - ".claude-plugin/**"
      - "VERSION"
      - "requirements-dev.txt"
      - ".github/workflows/test.yml"

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dev deps
        run: pip install -r requirements-dev.txt
      - name: Run tests under coverage (gate ≥ 85%)
        working-directory: plugins/caw/harness
        run: |
          python -m coverage run --source=src -m pytest tests -q
          python -m coverage report --fail-under=85

  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Validate plugin manifests + structure
        run: python plugins/caw/harness/tests/validate_plugin.py
