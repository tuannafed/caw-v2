name: release-pin-check

# A release tag must ship with the marketplace SHA pin already bumped to that
# tag's commit. Otherwise members installing the released version get a stale
# plugin. This gate fails the release if the pin in the project settings
# templates does not match the tagged commit.

on:
  push:
    tags:
      - "v*"

jobs:
  check-pin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Need the tag commit's parent for --allow-parent (the bump commit
          # pins to its parent). Default depth=1 has no parent → false-fail.
          fetch-depth: 2

      - name: Verify marketplace ref matches the release tag commit
        run: |
          TAG_SHA="$(git rev-parse HEAD)"   # the commit the tag points at
          echo "Release tag: ${GITHUB_REF_NAME} → ${TAG_SHA}"
          # --allow-parent: the bump commit pins to its own parent (a commit
          # cannot contain its own SHA). Accept tag commit or its parent.
          python3 cli/bump-marketplace-ref.py --check --sha "$TAG_SHA" --allow-parent
